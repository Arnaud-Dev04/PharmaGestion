<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="PharmaGestion — Système de gestion de pharmacie">
  <meta name="theme-color" content="#6C63FF">

  <!-- SEO -->
  <meta name="application-name" content="PharmaGestion">
  <meta property="og:title" content="PharmaGestion">
  <meta property="og:description" content="Système de gestion de pharmacie moderne">

  <!-- iOS -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="PharmaGestion">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>PharmaGestion</title>
  <link rel="manifest" href="manifest.json">

  <!-- Loading screen style -->
  <style>
    body {
      margin: 0;
      background: #0f0f1a;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: 'Segoe UI', sans-serif;
    }
    #loading {
      text-align: center;
      color: #ffffff;
    }
    #loading h2 {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #6C63FF, #48c774);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    #loading p {
      color: #8888aa;
      font-size: 0.9rem;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #1a1a2e;
      border-top: 3px solid #6C63FF;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 16px auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <!-- Écran de chargement affiché pendant que Flutter s'initialise -->
  <div id="loading">
    <h2>PharmaGestion</h2>
    <div class="spinner"></div>
    <p>Chargement en cours...</p>
  </div>

  <script>
    // Masquer l'écran de chargement quand Flutter est prêt
    window.addEventListener('flutter-first-frame', function() {
      document.getElementById('loading').style.display = 'none';
    });
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
